format:
  html:
    theme: cosmo
    default-image-extension: png
    toc: true
    toc-location: left
    toc-depth: 5
    toc-expand: true
    smooth-scroll: true
    css: si-tabs.css
    include-after-body:
      - text: '<script src="si-tabs.js"></script>'
    filters:
      - tikz.lua
      - shift-si-headings.lua
      - maintext-filter.lua
      - sitext-filter.lua
  pdf: 
    pdf-engine: xelatex
    documentclass: scrartcl
    numbersections: true
    template: template.tex
    cite-method: biblatex
    default-image-extension: pdf
    include-in-header:
      - file: _preamble.tex
    biblio-style: ieee
    keep-tex: false
    filters:
      - tikz.lua
      - strip-yaml-frontmatter.lua
      - abstract-filter.lua
      - color-text-span.lua
      - maintext-filter.lua
      - sitext-refsection.lua