# @package _global_

# --- Defaults ---
defaults:
  - data: ???  # Required: user must specify which dataset to use.
  - paths: paths
  - inference: svi
  - optional model: null  # Power users can use model=zinb, model=nbvcp, etc.
  - viz: default
  - amortization@amortization.capture: null  # Optional: use 'capture' for amortized capture
  - override optional paths: paths.local
  - _self_

# --- Data Loading ---
# path is now in conf/data

# --- Model Features ---
# These flags determine the model type automatically:
#   zero_inflation=false, variable_capture=false → nbdm (base model)
#   zero_inflation=true,  variable_capture=false → zinb (zero-inflated)
#   zero_inflation=false, variable_capture=true  → nbvcp (variable capture)
#   zero_inflation=true,  variable_capture=true  → zinbvcp (both)
zero_inflation: false    # Add zero-inflation gate (for excess zeros)
variable_capture: false  # Add cell-specific capture probability

# --- Model Configuration ---
# Power users can override the model directly: model=zinb, model=nbvcp, etc.
# This takes precedence over the feature flags above.

# Parameterization scheme
# - "canonical" (or "standard"): Sample p ~ Beta, r ~ LogNormal directly
# - "linked" (or "mean_prob"): Sample p ~ Beta, mu ~ LogNormal, derive r
# - "odds_ratio" (or "mean_odds"): Sample phi ~ BetaPrime, mu ~ LogNormal
parameterization: mean_odds

# Use unconstrained parameterization (Normal + transform)
unconstrained: false

# --- Hierarchical Flags ---
# These flags enable gene-specific hierarchical priors on selected parameters.
# When enabled, parameters are drawn from a learned population distribution
# rather than a fixed prior, providing adaptive shrinkage across genes.
hierarchical_p: false     # Gene-specific p/phi with hyperprior (requires unconstrained=true)
hierarchical_gate: false  # Gene-specific gate with hyperprior (ZI models only, requires unconstrained=true)
hierarchical_mu: false  # Hierarchical mu with hyperprior (requires unconstrained=true)

# --- Multi-Dataset Configuration ---
# Joint modeling of multiple datasets with hierarchical priors across datasets.
# Datasets are identified by a column in adata.obs (dataset_key). Assignments
# are fixed/observed (not inferred like mixture components).
n_datasets: null          # Number of datasets (null for single-dataset mode)
dataset_key: null         # Column in adata.obs identifying dataset membership
dataset_params: null      # Which params are per-dataset (null = default based on hierarchy flags)
hierarchical_dataset_mu: false  # Hierarchical mu/r across datasets with learned tau
hierarchical_dataset_p: "none"  # none | scalar | gene_specific | two_level
hierarchical_dataset_gate: false  # Hierarchical gate across datasets with learned shrinkage

# --- Horseshoe Prior Configuration ---
# Regularized horseshoe (Piironen & Vehtari 2017) replaces the single global
# scale in a hierarchy with per-gene local shrinkage. Each flag is MUTUALLY
# EXCLUSIVE with its corresponding normal hierarchy flag — the horseshoe
# implicitly creates the hierarchy, so do NOT set both.
horseshoe_p: false              # Horseshoe for gene-level p (mutually exclusive with hierarchical_p)
horseshoe_gate: false           # Horseshoe for gene-level gate (mutually exclusive with hierarchical_gate)
horseshoe_dataset_mu: false     # Horseshoe for dataset-level mu (mutually exclusive with hierarchical_dataset_mu)
horseshoe_dataset_p: false      # Horseshoe for dataset-level p (mutually exclusive with hierarchical_dataset_p)
horseshoe_dataset_gate: false   # Horseshoe for dataset-level gate (mutually exclusive with hierarchical_dataset_gate)
horseshoe_tau0: 1.0             # Global shrinkage scale (Half-Cauchy prior on tau)
horseshoe_slab_df: 4            # Slab degrees of freedom (Inverse-Gamma on c^2)
horseshoe_slab_scale: 2.0       # Slab scale (Inverse-Gamma on c^2)

# --- Biology-Informed Capture Prior ---
# Anchors p_capture to library size via known total mRNA per cell.
# See paper/_capture_prior.qmd for derivation.
# All capture-prior parameters live in the priors section below.
# Set priors.organism (or priors.eta_capture) to activate biology-informed mode.
shared_capture_scaling: false     # learn shared mu_eta across datasets

# Mixture model configuration
# Set to integer >= 2 for mixture models, null for single component.
# When annotation_key is provided and n_components is null, the number
# of components is automatically inferred from the unique labels.
n_components: null

# Which parameters should be component-specific in mixture models
# null = default (all sampled core params), or explicit list like ["r", "gate"]
mixture_params: null

# Guide configuration
# null = mean-field, integer = low-rank with that rank
guide_rank: null

# Joint low-rank guide: model listed gene-specific parameters jointly,
# capturing cross-parameter correlations (e.g. mu-phi).
# Requires guide_rank to be set. Example: [mu, phi]
joint_params: null

# --- Priors Configuration (optional overrides) ---
# Each prior is a list [param1, param2] for the distribution
# - Beta priors: [alpha, beta]
# - LogNormal priors: [loc, scale]
# - BetaPrime priors: [alpha, beta]
priors:
  p: null           # Beta(alpha, beta) for success probability
  r: null           # LogNormal(loc, scale) for dispersion
  mu: null          # LogNormal(loc, scale) for mean (linked/odds_ratio)
  phi: null         # BetaPrime(alpha, beta) for odds ratio
  gate: null        # Beta(alpha, beta) for zero-inflation gate
  p_capture: null   # Beta(alpha, beta) for capture probability
  phi_capture: null # BetaPrime(alpha, beta) for capture odds
  mixing: null      # Dirichlet concentrations for mixture weights
  # Hierarchical hyperprior overrides (only used when hierarchical flags are set)
  # Gene-level hierarchical p/phi (hierarchical_p=true)
  logit_p_loc: null       # Normal(loc, scale) for p hyperprior mean (canonical/mean_prob)
  logit_p_scale: null     # SoftplusNormal(loc, scale) for p hyperprior spread
  log_phi_loc: null       # Normal(loc, scale) for phi hyperprior mean (mean_odds)
  log_phi_scale: null     # SoftplusNormal(loc, scale) for phi hyperprior spread
  # Gene-level hierarchical gate (hierarchical_gate=true)
  logit_gate_loc: null    # Normal(loc, scale) for gate hyperprior mean
  logit_gate_scale: null  # SoftplusNormal(loc, scale) for gate hyperprior spread
  # Dataset-level hierarchical mu/r (hierarchical_dataset_mu=true)
  log_mu_dataset_loc: null    # Normal(loc, scale) for population mu mean (mean_odds/mean_prob)
  log_mu_dataset_scale: null  # SoftplusNormal(loc, scale) for mu shrinkage (tau_mu)
  log_r_dataset_loc: null     # Normal(loc, scale) for population r mean (canonical)
  log_r_dataset_scale: null   # SoftplusNormal(loc, scale) for r shrinkage (tau_r)
  # Dataset-level hierarchical p/phi (hierarchical_dataset_p != "none")
  logit_p_dataset_loc: null   # Normal(loc, scale) for population p mean (canonical/mean_prob)
  logit_p_dataset_scale: null # SoftplusNormal(loc, scale) for p dataset shrinkage
  log_phi_dataset_loc: null   # Normal(loc, scale) for population phi mean (mean_odds)
  log_phi_dataset_scale: null # SoftplusNormal(loc, scale) for phi dataset shrinkage
  # Dataset-level hierarchical gate (hierarchical_dataset_gate=true)
  logit_gate_dataset_loc: null    # Normal(loc, scale) for population gate mean
  logit_gate_dataset_scale: null  # SoftplusNormal(loc, scale) for gate dataset shrinkage
  # Biology-informed capture prior (activates automatically when any is set)
  organism: null                  # "human", "mouse", "yeast", "ecoli" (resolves defaults)
  eta_capture: null               # [log_M0, sigma_M] for per-cell TruncatedNormal+ prior
  mu_eta: null                    # [center, sigma_mu] for shared mu_eta Normal prior

# --- Amortization Configuration (for VCP models) ---
# Amortized inference uses a neural network to predict variational parameters
# from total UMI count instead of learning per-cell parameters.
# Only applies to nbvcp and zinbvcp models.
amortization:
  capture:
    enabled: false       # Enable amortized capture probability inference
    hidden_dims: [64, 32]  # MLP hidden layer dimensions
    activation: leaky_relu     # Activation: relu, gelu, silu, tanh, etc.
    output_transform: softplus  # Transform for constrained outputs: softplus or exp
    output_clamp_min: 0.1       # Min clamp for alpha/beta (null to disable)
    output_clamp_max: 50.0      # Max clamp for alpha/beta (null to disable)

# --- Annotation Prior (for mixture models) ---
# Provide per-cell prior beliefs about component assignments from adata.obs.
# annotation_key: column name (str) or list of column names in adata.obs.
#   When a list, composite labels are formed by joining values with "__".
#   e.g. ["cell_type", "treatment"] → "T__ctrl", "B__stim", ...
# annotation_confidence: kappa, prior strength (0=ignore, 3=default ~20x boost)
# annotation_component_order: explicit label-to-component index ordering (optional)
annotation_key: null
annotation_confidence: 3.0
annotation_component_order: null
# Minimum number of cells for an annotation label to be used as a component
# prior. Labels with fewer cells are treated as unlabeled (zero bias).
annotation_min_cells: null

# --- SVI-to-MCMC Initialization ---
# Path to a pickled ScribeSVIResults file to initialize MCMC chains.
# The SVI MAP estimates are extracted and used as starting values for NUTS.
# Only valid when inference=mcmc.  null = no initialization (default).
svi_init: null

# --- Resume Training / Initialization Source ---
# Optional path used to resume or warm-start an inference run.
# Supported values:
# - run directory (expects checkpoints/ and/or scribe_results.pkl)
# - checkpoints directory
# - scribe_results.pkl file
# Behavior:
# - inference=svi|vae: resumes from checkpoint state (requires checkpoints/)
# - inference=mcmc: if svi_init is null, uses scribe_results.pkl from this source
resume_from: null

# --- General Settings ---
seed: 42

# Data Processing
cells_axis: 0
# AnnData layer for raw counts (null → use .X).
# Can also be set per-dataset in the data config file (data.layer),
# which takes precedence over this global setting.
layer: null

# --- Output Configuration ---
# Optional custom output subdirectory (inside data directory)
# If set, overrides the auto-generated directory name from config overrides
output_dir: null

# --- Hydra settings ---
hydra:
  run:
    # Use output_dir if explicitly set by user, otherwise auto-generate from overrides
    # Note: We use 'model' in path to keep runs organized by model type
    # sanitize_dirname removes brackets [] which cause issues with Orbax checkpoint library
    dir: ${paths.outputs_dir}/${data.name}/${model}/${inference.method}/${sanitize_dirname:${hydra:job.override_dirname}}
  sweep:
    # For --multirun (joblib) sweeps, use the same output structure as single runs
    # instead of Hydra's default multirun/ directory.  sweep.dir is resolved once
    # before jobs are composed, so per-job interpolations (data.name, model, etc.)
    # must go in sweep.subdir which is resolved per-job.
    dir: ${paths.outputs_dir}
    subdir: ${data.name}/${model}/${inference.method}/${sanitize_dirname:${hydra:job.override_dirname}}
  job:
    name: ${data.name}_${inference.method}
    config:
      override_dirname:
        exclude_keys:
          - viz
          - viz.run_dir
          - viz.loss
          - viz.ecdf
          - viz.ppc
          - viz.umap
          - viz.heatmap
          - viz.mixture_ppc
          - viz.annotation_ppc
          - viz.format
          - viz.ecdf_opts
          - viz.ppc_opts
          - viz.umap_opts
          - viz.heatmap_opts
          - viz.mixture_ppc_opts
          - viz.annotation_ppc_opts
          - output_dir
          - resume_from
          - svi_init
          - inference.empirical_mixing
          - inference.enable_x64
          - inference.early_stopping.enabled
          - inference.early_stopping.patience
          - inference.log_progress_lines
          - inference.batch_size
          - inference.n_steps
          - data
          - data.subset_column
          - model
          - unconstrained
