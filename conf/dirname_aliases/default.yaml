# @package _global_

# Key aliases used by the sanitize_dirname resolver to shorten override keys
# in output directory names.
#
# This starter map is based on commonly repeated override keys found in the
# existing outputs directory tree. Adjust as needed.
dirname_aliases:
  aliases:
    # Core model/run controls
    parameterization: param
    guide_rank: rank
    model: model
    data: data

    # Mixture / annotation controls
    mixture_params: mixparam
    joint_params: jointparam
    dense_params: denseparam
    annotation_key: annkey
    annotation_confidence: annconf
    annotation_min_cells: annmin
    dataset_mixing: datamix

    # Flow-based guide controls
    guide_flow: gflow
    guide_flow_num_layers: gflowlayers
    guide_flow_hidden_dims: gflowhidden
    guide_flow_activation: gflowact
    guide_flow_n_bins: gflowbins
    guide_flow_mixture_strategy: gflowmix
    guide_flow_zero_init: gflowzinit
    guide_flow_layer_norm: gflowln
    guide_flow_residual: gflowres
    guide_flow_log_det_f64: gflowf64

    # Hierarchical prior type fields
    expression_prior: exprprior
    prob_prior: probprior
    zero_inflation_prior: zeroprior
    overdispersion_prior: overdispprior
    expression_dataset_prior: exprdataprior
    prob_dataset_prior: probdataprior
    prob_dataset_mode: pdatamode
    zero_inflation_dataset_prior: zerodataprior
    overdispersion_dataset_prior: overdispdatasetprior
    positive_transform: postransform

    # Data-informed mean anchoring prior
    expression_anchor: meananchor
    expression_anchor_sigma: meananchorsigma

    # Frequently seen prior overrides
    priors.capture_efficiency: captureprior
    priors.mixing: mixprior
    priors.gate: zeroprior

    # Inference knobs (often long in paths)
    inference.batch_size: bsize
    inference.n_steps: nsteps
    inference.n_samples: nsamples
    inference.n_warmup: nwarmup
    inference.method: method

    # Biology-informed capture prior
    capture_scaling_prior: capscalingprior
